    ```
    <div class="container">

        <!-- Lanes -->
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>

        <!-- Cars -->
        <div class="car red" id="redCar"></div>
        <div class="car blue" id="blueCar"></div>

        <!-- Score -->
        <div class="score" id="score">0</div>

        <!-- Game Over -->
        <div class="gameOver" id="gameOver">
            <h2>Game Over</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>

            <p>Select Speed:</p>
            <select id="speedSelect">
                <option value="3">Normal</option>
                <option value="4">Fast</option>
                <option value="5">Pro</option>
            </select>

            <button onclick="restartGame()">Restart</button>
        </div>

    </div>

    <script>
        let score = 0;
        let redLane = 0;
        let blueLane = 3;

        let speed = 8;
        let maxSpeed = 20;
        let speedIncrease = 0.15;

        let gameRunning = true;

        /* Load saved speed */
        let savedSpeed = localStorage.getItem("gameSpeed");
        if (savedSpeed) speed = parseFloat(savedSpeed);

        /* High Score */
        let highScore = localStorage.getItem("highScore") || 0;
        document.getElementById("highScore").innerText = highScore;

        const redCar = document.getElementById("redCar");
        const blueCar = document.getElementById("blueCar");
        const container = document.querySelector(".container");

        let lastLane = -1;

        function getLane() {
            let lane;
            do {
                lane = Math.floor(Math.random() * 4);
            } while (lane === lastLane);
            lastLane = lane;
            return lane;
        }

        function updateCars() {
            redCar.style.left = (redLane * 25 + 10) + "%";
            blueCar.style.left = (blueLane * 25 + 10) + "%";
        }

        document.addEventListener("keydown", (e) => {
            if (!gameRunning) return;

            if (e.key === "a" && redLane > 0) redLane--;
            if (e.key === "d" && redLane < 1) redLane++;

            if (e.key === "ArrowLeft" && blueLane > 2) blueLane--;
            if (e.key === "ArrowRight" && blueLane < 3) blueLane++;

            updateCars();
        });

        document.addEventListener("touchstart", (e) => {
            if (!gameRunning) return;

            let x = e.touches[0].clientX;
            let w = window.innerWidth;

            if (x < w / 2) {
                redLane = (redLane === 0) ? 1 : 0;
            } else {
                blueLane = (blueLane === 2) ? 3 : 2;
            }

            updateCars();
        });

        function createItem(type) {
            if (!gameRunning) return;

            let item = document.createElement("div");
            item.classList.add(type);

            let lane = getLane();
            item.style.left = (lane * 25 + 8) + "%";

            container.appendChild(item);

            let top = -50;

            let fall = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(fall);
                    item.remove();
                    return;
                }

                top += speed;
                item.style.top = top + "px";

                let r1 = item.getBoundingClientRect();
                let r2 = redCar.getBoundingClientRect();
                let r3 = blueCar.getBoundingClientRect();

                if (type === "stone" && (hit(r1, r2) || hit(r1, r3))) {
                    gameOver();
                }

                if (type === "coin" && (hit(r1, r2) || hit(r1, r3))) {
                    score++;
                    document.getElementById("score").innerText = score;
                    item.remove();
                    clearInterval(fall);
                }

                if (type === "coin" && top > 650) {
                    gameOver();
                }

                if (top > 700) {
                    item.remove();
                    clearInterval(fall);
                }

            }, 70);
        }

        function hit(a, b) {
            return !(a.bottom < b.top || a.top > b.bottom || a.right < b.left || a.left > b.right);
        }

        function gameOver() {
            gameRunning = false;

            document.getElementById("gameOver").style.display = "flex";
            document.getElementById("finalScore").innerText = score;

            if (score > highScore) {
                localStorage.setItem("highScore", score);
                document.getElementById("highScore").innerText = score;
            }
        }

        function restartGame() {
            let selectedSpeed = document.getElementById("speedSelect").value;
            localStorage.setItem("gameSpeed", selectedSpeed);
            location.reload();
        }

        function spawn(type, min, max) {
            function loop() {
                if (!gameRunning) return;
                createItem(type);
                setTimeout(loop, Math.random() * (max - min) + min);
            }
            loop();
        }

        /* Stone gap increased */
        spawn("stone", 3000, 5000);
        spawn("coin", 2000, 3500);

        setInterval(() => {
            if (speed < maxSpeed) speed += speedIncrease;
        }, 3000);

    </script>
