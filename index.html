<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>2 Car Game</title>

    <style>
        body {
            margin: 0;
            background: #20387a;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .lane {
            position: absolute;
            width: 25%;
            height: 100%;
            border-right: 2px dashed #3c5aab;
        }

        .lane:nth-child(1) {
            left: 0%
        }

        .lane:nth-child(2) {
            left: 25%
        }

        .lane:nth-child(3) {
            left: 50%
        }

        .lane:nth-child(4) {
            left: 75%;
            border-right: none
        }

        /* Cars */
        .car {
            position: absolute;
            width: 60px;
            height: 100px;
            border-radius: 20px;
            top: 68%;
            transition: left 0.15s;
        }

        .red {
            background: #ff1f55;
            left: 10%;
        }

        .blue {
            background: #00c5d9;
            left: 60%;
        }

        /* Objects */
        .stone {
            position: absolute;
            width: 60px;
            height: 60px;
            background: gray;
            border-radius: 50%;
            top: -60px;
        }

        .coin {
            position: absolute;
            width: 55px;
            height: 55px;
            background: gold;
            border-radius: 50%;
            top: -60px;
        }

        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 26px;
        }

        .gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>

        <div class="car red" id="redCar"></div>
        <div class="car blue" id="blueCar"></div>

        <div class="score" id="score">0</div>

        <div class="gameOver" id="gameOver">
            <h2>Game Over</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>

            <p>Select Speed:</p>
            <select id="speedSelect">
                <option value="8">Normal</option>
                <option value="12">Fast</option>
                <option value="16">Pro</option>
            </select>

            <button onclick="restartGame()">Restart</button>
        </div>
    </div>

    <script>

        let score = 0;
        let redLane = 0;
        let blueLane = 3;

        let speed = window.innerWidth < 500 ? 12 : 8;
        let maxSpeed = 20;
        let speedIncrease = 0.2;

        let gameRunning = true;
        let coinGroupActive = false;

        /* Load speed */
        let savedSpeed = localStorage.getItem("gameSpeed");
        if (savedSpeed) {
            speed = parseFloat(savedSpeed);
            window.onload = () => {
                document.getElementById("speedSelect").value = savedSpeed;
            };
        }

        /* High Score */
        let highScore = parseInt(localStorage.getItem("highScore")) || 0;
        document.getElementById("highScore").innerText = highScore;

        const redCar = document.getElementById("redCar");
        const blueCar = document.getElementById("blueCar");
        const container = document.querySelector(".container");

        /* Update cars */
        function updateCars() {
            redCar.style.left = (redLane * 25 + 10) + "%";
            blueCar.style.left = (blueLane * 25 + 10) + "%";
        }
        updateCars();

        /* Controls */
        document.addEventListener("keydown", (e) => {
            if (!gameRunning) return;

            if (e.key === "a" || e.key === "A") if (redLane > 0) redLane--;
            if (e.key === "d" || e.key === "D") if (redLane < 1) redLane++;

            if (e.key === "ArrowLeft") if (blueLane > 2) blueLane--;
            if (e.key === "ArrowRight") if (blueLane < 3) blueLane++;

            updateCars();
        });

        document.addEventListener("touchstart", (e) => {
            if (!gameRunning) return;

            let x = e.touches[0].clientX;
            let w = window.innerWidth;

            if (x < w / 2) {
                redLane = (redLane === 0) ? 1 : 0;
            } else {
                blueLane = (blueLane === 2) ? 3 : 2;
            }

            updateCars();
        });

        /* Collision */
        function hit(a, b) {
            return !(a.bottom < b.top || a.top > b.bottom || a.right < b.left || a.left > b.right);
        }

        /* Game Over */
        function gameOver() {
            gameRunning = false;
            document.getElementById("gameOver").style.display = "flex";
            document.getElementById("finalScore").innerText = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("highScore", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        /* Restart */
        function restartGame() {
            let selectedSpeed = document.getElementById("speedSelect").value;
            localStorage.setItem("gameSpeed", selectedSpeed);
            location.reload();
        }

        /* Coins */
        function createCoinInLane(lane, offsetY) {

            let item = document.createElement("div");
            item.classList.add("coin");

            item.style.left = (lane * 25 + 10) + "%";
            container.appendChild(item);

            let top = -60 - offsetY;

            let fall = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(fall);
                    item.remove();
                    return;
                }

                top += speed;
                item.style.top = top + "px";

                let r1 = item.getBoundingClientRect();
                let r2 = redCar.getBoundingClientRect();
                let r3 = blueCar.getBoundingClientRect();

                // ✅ COLLISION
                if (hit(r1, r2) || hit(r1, r3)) {
                    score++;
                    document.getElementById("score").innerText = score;
                    item.remove();
                    clearInterval(fall);
                    return;
                }

                // ❌ MISS CHECK (IMPORTANT 🔥)
                if (top > window.innerHeight) {

                    // LEFT SIDE (red lanes 0,1)
                    if (lane === 0 || lane === 1) {
                        gameOver();
                    }

                    // RIGHT SIDE (blue lanes 2,3)
                    if (lane === 2 || lane === 3) {
                        gameOver();
                    }

                    item.remove();
                    clearInterval(fall);
                }

            }, 30);
        }

        function createCoinBothSides() {

            let gap = window.innerWidth < 500 ? 90 : 130;

            createCoinInLane(0, 0);
            createCoinInLane(1, gap);

            createCoinInLane(2, 0);
            createCoinInLane(3, gap);
        }

        /* Stone */
        function createStone() {

            let item = document.createElement("div");
            item.classList.add("stone");

            let lane = Math.floor(Math.random() * 4);
            item.style.left = (lane * 25 + 10) + "%";

            container.appendChild(item);

            let top = -60;

            let fall = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(fall);
                    item.remove();
                    return;
                }

                top += speed;
                item.style.top = top + "px";

                let r1 = item.getBoundingClientRect();
                let r2 = redCar.getBoundingClientRect();
                let r3 = blueCar.getBoundingClientRect();

                if (hit(r1, r2) || hit(r1, r3)) {
                    gameOver();
                }

                if (top > window.innerHeight + 100) {
                    item.remove();
                    clearInterval(fall);
                }

            }, 30);
        }

        /* Spawn */
        function spawnCoins() {
            function loop() {
                if (!gameRunning) return;

                if (!coinGroupActive) {
                    coinGroupActive = true;

                    createCoinBothSides();

                    setTimeout(() => {
                        coinGroupActive = false;
                    }, 1200);
                }

                setTimeout(loop, 1200);
            }
            loop();
        }

        function spawnStone() {
            function loop() {
                if (!gameRunning) return;
                createStone();
                setTimeout(loop, 2000);
            }
            loop();
        }

        spawnCoins();
        spawnStone();

        /* Speed increase */
        setInterval(() => {
            if (speed < maxSpeed) speed += speedIncrease;
        }, 3000);

    </script>

</body>

</html>
