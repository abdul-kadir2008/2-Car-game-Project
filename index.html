<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>2 Car Game</title>

    <style>
        body {
            margin: 0;
            background: #20387a;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .lane {
            position: absolute;
            width: 25%;
            height: 100%;
            border-right: 2px dashed #3c5aab;
        }

        .lane:nth-child(1) {
            left: 0%
        }

        .lane:nth-child(2) {
            left: 25%
        }

        .lane:nth-child(3) {
            left: 50%
        }

        .lane:nth-child(4) {
            left: 75%;
            border-right: none
        }

        /* Cars */
        .car {
            position: absolute;
            width: 60px;
            height: 100px;
            border-radius: 20px;
            top: 68%;
            transition: left 0.15s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .red {
            background: linear-gradient(145deg, #ff1f55, #ff4d7a);
            left: 10%;
        }

        .blue {
            background: linear-gradient(145deg, #00c5d9, #00e6ff);
            left: 60%;
        }

        /* Objects - 3x Distance */
        .stone {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #666, #888);
            border-radius: 50%;
            top: -180px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        .coin {
            position: absolute;
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #ffd700, #ffed4a);
            border-radius: 50%;
            top: -180px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .gameOver h2 {
            font-size: 48px;
            margin: 0 0 20px 0;
            background: linear-gradient(45deg, #ff1f55, #00c5d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(145deg, #ff1f55, #ff4d7a);
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 31, 85, 0.4);
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 31, 85, 0.6);
        }

        select {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #00c5d9;
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>

        <div class="car red" id="redCar"></div>
        <div class="car blue" id="blueCar"></div>

        <div class="score" id="score">0</div>

        <div class="controls">
            <div>A/D → Red Car (Lanes 0-1)</div>
            <div>←→ → Blue Car (Lanes 2-3)</div>
            <div>❌ MISS COIN = GAME OVER</div>
        </div>

        <div class="gameOver" id="gameOver">
            <h2>Game Over</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>

            <p>Select Speed:</p>
            <select id="speedSelect">
                <option value="8">Normal</option>
                <option value="12">Fast</option>
                <option value="16">Pro</option>
                <option value="20">Insane</option>
            </select>

            <button onclick="restartGame()">Restart Game</button>
        </div>
    </div>

    <script>
        let score = 0;
        let redLane = 0;
        let blueLane = 3;

        let speed = window.innerWidth < 500 ? 12 : 8;
        let maxSpeed = 22;
        let speedIncrease = 0.15;

        let gameRunning = true;
        let activeCoins = [];
        let lastObjectTime = 0; // Track last object spawn time
        const MIN_OBJECT_GAP = 1200; // Minimum 1.2s gap between any objects

        /* Load saved settings */
        let savedSpeed = localStorage.getItem("gameSpeed");
        if (savedSpeed) {
            speed = parseFloat(savedSpeed);
        }

        /* High Score */
        let highScore = parseInt(localStorage.getItem("highScore")) || 0;
        document.getElementById("highScore").innerText = highScore;

        const redCar = document.getElementById("redCar");
        const blueCar = document.getElementById("blueCar");
        const container = document.querySelector(".container");

        /* Update car positions */
        function updateCars() {
            redCar.style.left = (redLane * 25 + 10) + "%";
            blueCar.style.left = (blueLane * 25 + 10) + "%";
        }
        updateCars();

        /* Keyboard Controls */
        document.addEventListener("keydown", (e) => {
            if (!gameRunning) return;

            if (e.key === "a" || e.key === "A") {
                if (redLane > 0) redLane--;
            }
            if (e.key === "d" || e.key === "D") {
                if (redLane < 1) redLane++;
            }

            if (e.key === "ArrowLeft") {
                if (blueLane > 2) blueLane--;
            }
            if (e.key === "ArrowRight") {
                if (blueLane < 3) blueLane++;
            }

            updateCars();
        });

        /* Touch Controls */
        document.addEventListener("touchstart", (e) => {
            if (!gameRunning) return;

            e.preventDefault();
            let x = e.touches[0].clientX;
            let w = window.innerWidth;

            if (x < w / 2) {
                redLane = (redLane === 0) ? 1 : 0;
            } else {
                blueLane = (blueLane === 2) ? 3 : 2;
            }

            updateCars();
        });

        /* Collision Detection */
        function hit(a, b) {
            const aRect = a.getBoundingClientRect();
            const bRect = b.getBoundingClientRect();
            return !(
                aRect.bottom < bRect.top ||
                aRect.top > bRect.bottom ||
                aRect.right < bRect.left ||
                aRect.left > bRect.right
            );
        }

        /* Game Over */
        function gameOver(reason = "") {
            gameRunning = false;
            document.getElementById("gameOver").style.display = "flex";
            document.getElementById("finalScore").innerText = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("highScore", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        /* Restart Game */
        function restartGame() {
            let selectedSpeed = document.getElementById("speedSelect").value;
            localStorage.setItem("gameSpeed", selectedSpeed);
            location.reload();
        }

        /* SAFE SPAWN CHECK - Maintain distance between ALL objects */
        function canSpawnObject() {
            const now = Date.now();
            return (now - lastObjectTime) > MIN_OBJECT_GAP;
        }

        function updateLastSpawn() {
            lastObjectTime = Date.now();
        }

        /* Create Coin */
        function createCoinInLane(lane, offsetY = 0, carType) {
            if (!canSpawnObject()) return; // Check distance first

            let coin = document.createElement("div");
            coin.classList.add("coin");
            coin.style.left = (lane * 25 + 12.5) + "%";
            coin.dataset.lane = lane;
            coin.dataset.carType = carType;
            container.appendChild(coin);
            activeCoins.push(coin);
            updateLastSpawn(); // Update spawn time

            let top = -180 - offsetY;
            let fallInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(fallInterval);
                    removeCoin(coin);
                    return;
                }

                top += speed;
                coin.style.top = top + "px";

                let coinRect = coin.getBoundingClientRect();
                let targetCar = carType === 'red' ? redCar : blueCar;

                // Coin collected
                if (hit(coin, targetCar)) {
                    score += 10;
                    document.getElementById("score").innerText = score;
                    removeCoin(coin);
                    clearInterval(fallInterval);
                    return;
                }

                // Coin missed = GAME OVER
                if (top > window.innerHeight * 0.75) {
                    removeCoin(coin);
                    clearInterval(fallInterval);
                    gameOver(`Missed ${carType.toUpperCase()} Coin!`);
                    return;
                }

                if (top > window.innerHeight + 50) {
                    removeCoin(coin);
                    clearInterval(fallInterval);
                }
            }, 25);
        }

        function removeCoin(coin) {
            const index = activeCoins.indexOf(coin);
            if (index > -1) {
                activeCoins.splice(index, 1);
            }
            if (coin.parentNode) {
                coin.remove();
            }
        }

        /* RED CAR COINS (Lanes 0-1) */
        function spawnRedCoins() {
            function loop() {
                if (!gameRunning) return;

                if (Math.random() < 0.45 && canSpawnObject()) {
                    let redLane = Math.floor(Math.random() * 2); // Lanes 0-1
                    let offsetY = Math.floor(Math.random() * 80);
                    createCoinInLane(redLane, offsetY, 'red');
                }

                setTimeout(loop, Math.random() * 600 + 1200); // 1200-1800ms
            }
            loop();
        }

        /* BLUE CAR COINS (Lanes 2-3) */
        function spawnBlueCoins() {
            function loop() {
                if (!gameRunning) return;

                if (Math.random() < 0.45 && canSpawnObject()) {
                    let blueLane = Math.floor(Math.random() * 2) + 2; // Lanes 2-3
                    let offsetY = Math.floor(Math.random() * 80);
                    createCoinInLane(blueLane, offsetY, 'blue');
                }

                setTimeout(loop, Math.random() * 600 + 1200); // 1200-1800ms
            }
            loop();
        }

        /* STONES - Also respects distance */
        function createStone() {
            if (!canSpawnObject()) return;

            let stone = document.createElement("div");
            stone.classList.add("stone");
            let lane = Math.floor(Math.random() * 4);
            stone.style.left = (lane * 25 + 12.5) + "%";
            container.appendChild(stone);
            updateLastSpawn();

            let top = -180;
            let fallInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(fallInterval);
                    stone.remove();
                    return;
                }

                top += speed;
                stone.style.top = top + "px";

                let stoneRect = stone.getBoundingClientRect();
                if (hit(stone, redCar) || hit(stone, blueCar)) {
                    stone.remove();
                    clearInterval(fallInterval);
                    gameOver("Hit Stone!");
                    return;
                }

                if (top > window.innerHeight + 100) {
                    stone.remove();
                    clearInterval(fallInterval);
                }
            }, 25);
        }

        /* Stones with distance control */
        function spawnStones() {
            function loop() {
                if (!gameRunning) return;

                if (canSpawnObject()) {
                    createStone();
                }

                let nextStone = Math.random() * 1000 + 2000; // 2000-3000ms
                setTimeout(loop, nextStone);
            }
            loop();
        }

        /* Start Game */
        spawnRedCoins();
        spawnBlueCoins();
        spawnStones();

        /* Progressive Speed */
        setInterval(() => {
            if (speed < maxSpeed && gameRunning) {
                speed += speedIncrease;
            }
        }, 4000);

        /* Set speed selector */
        window.addEventListener('load', () => {
            const speedSelect = document.getElementById("speedSelect");
            if (savedSpeed) {
                speedSelect.value = savedSpeed;
            }
        });
    </script>

</body>

</html>
